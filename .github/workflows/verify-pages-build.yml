name: Verify GitHub Pages Build

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build and verify GitHub Pages output
        run: npm run check:github
        env:
          PAGES_BASE_PATH: /mathgradepoint
          SITE_URL: https://xieyaozhong.github.io/mathgradepoint
