<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">MATH//SCAN maskable app icon</title>
  <desc id="desc">A mask-safe neon mathematics scanner with a cyan and violet letter M.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020719"/>
      <stop offset="0.55" stop-color="#081130"/>
      <stop offset="1" stop-color="#090622"/>
    </linearGradient>
    <linearGradient id="m" x1="150" y1="255" x2="362" y2="255" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39f7ff"/>
      <stop offset="0.43" stop-color="#159cff"/>
      <stop offset="0.52" stop-color="#f9fbff"/>
      <stop offset="0.64" stop-color="#9e64ff"/>
      <stop offset="1" stop-color="#dc58ff"/>
    </linearGradient>
    <linearGradient id="scan" x1="88" y1="256" x2="424" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#36f5ff"/>
      <stop offset="0.5" stop-color="#2777ff"/>
      <stop offset="1" stop-color="#e277ff"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#1687d1" stroke-opacity="0.11"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="232" fill="#07102b" stroke="#20296a" stroke-width="6"/>
  <circle cx="256" cy="256" r="203" fill="url(#grid)" opacity="0.72"/>
  <circle cx="256" cy="260" r="160" fill="none" stroke="url(#scan)" stroke-width="3" opacity="0.48"/>
  <circle cx="256" cy="260" r="138" fill="none" stroke="url(#scan)" stroke-width="2" stroke-dasharray="2 12" stroke-linecap="round" opacity="0.4"/>

  <g fill="none" stroke-width="12" stroke-linecap="round" filter="url(#glow)">
    <path d="M100 164v-42q0-20 20-20h42" stroke="#39f6ff"/>
    <path d="M350 102h42q20 0 20 20v42" stroke="#e179ff"/>
    <path d="M100 348v42q0 20 20 20h42" stroke="#39f6ff"/>
    <path d="M350 410h42q20 0 20-20v-42" stroke="#e179ff"/>
  </g>

  <g filter="url(#glow)">
    <path d="M256 135v42M235 156h42" stroke="#ffb126" stroke-width="13" stroke-linecap="round"/>
    <path d="M256 137v38M237 156h38" stroke="#fff48a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M159 342V207L256 304L353 207V342" fill="none" stroke="#04091e" stroke-width="83" stroke-linecap="square" stroke-linejoin="bevel" opacity="0.88"/>
    <path d="M159 342V207L256 304L353 207V342" fill="none" stroke="url(#m)" stroke-width="65" stroke-linecap="square" stroke-linejoin="bevel" filter="url(#glow)"/>
    <path d="M161 216L256 311L351 216" fill="none" stroke="#fff" stroke-opacity="0.44" stroke-width="7" stroke-linejoin="bevel"/>
  </g>

  <g fill="#37f5ff" filter="url(#glow)">
    <rect x="132" y="310" width="17" height="17" rx="3"/>
    <rect x="148" y="329" width="14" height="14" rx="3"/>
    <rect x="121" y="343" width="11" height="11" rx="2"/>
  </g>
</svg>
